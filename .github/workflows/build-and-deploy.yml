name: build, unzip, replace index.html, deploy
on:
 push:
   branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Verify _demos matches _zips
        id: verify
        run: |
          output=$(bash ${GITHUB_WORKSPACE}/verify_md_zip.sh 2>&1) || echo "::set-output name=error::$output"
      - name: Cancel workflow if files don't correspond
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            const error = process.env.ERROR_MESSAGE || '_demos do not match _zips';
            core.setFailed(error);
        env:
          ERROR_MESSAGE: ${{ steps.verify.outputs.error }}


      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build
        uses: actions/jekyll-build-pages@v1
        
      - name: Extract Zipped Games
        run: |
          for zipfile in _zips/*.zip; do
            gamename=$(basename "$zipfile" .zip)
            sudo mkdir -p "_site/iframe/$gamename"
            sudo unzip "$zipfile" -d "_site/iframe/$gamename"
          done

      - name: Copy Existing Page to Index.html
        run: |
          sudo cp _site/sketch-ball.html _site/index.html
          echo "Copied sketch-ball.html to index.html"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
