title: tessmero.github.io
description: tessmero.github.io


# Build settings
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag  



collections:
  demos:
    output: true
    permalink: /:name
  changelogs:
    output: false
  techs:
    output: false

# navigation bar with dropdowns
header_pages:
  - "_demos/trees.md"
  - "_demos/collide-o-scope.md"
  - "_demos/avalanche.md"
  - "_demos/orbital-launch.md"
         
  


# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - update_boostrap.sh
