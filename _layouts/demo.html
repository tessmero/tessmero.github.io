<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  {%- include head.html -%}

  <body>

    {%- include header.html -%}
  <script>
    document.querySelectorAll('.nav-item.{{page.slug}}').forEach(function(item) {
    item.classList.add('active');
});
  </script>

          {{ content }}
<script src="{{ '/assets/javascript/demos/' | append: page.slug | append: '.js' }}?v={{ page.lastUpdated }}{% if page.lastUpdatedSubversion %}{{ page.lastUpdatedSubversion }}{% endif %}"></script>



<a id="source-link">© 2023 - 2024 Oliver Tessmer</a>


<style>
    
    #source-link {
        font-size:10px;
        position: fixed;
        z-index: 999;
        bottom: 0px;
        left: 50%;
        transform: translate(-50%, 0%);
        background-color: black;
        color: white !important;
        padding: 2px;
        
        -webkit-touch-callout:none;
        -webkit-user-select:none;
        -khtml-user-select:none;
        -moz-user-select:none;
        -ms-user-select:none;
        user-select:none;
        -webkit-tap-highlight-color:rgba(0,0,0,0);
    }

    #info-footer {
        position: fixed;
        bottom: -100%; /* Hidden by default */
        left: 0;
        width: 100%;
        background-color: #AAA;
        color: white;
        text-align: center;
        padding: 10px;
        padding-bottom: 20px;
        transition: bottom 0.5s ease;
        z-index: 998;
    }

    #info-footer.show {
        bottom: 0; /* Expand from the bottom */
    }
</style>

<script>
    
    document.querySelector('canvas').addEventListener('contextmenu', (event) => {
      event.preventDefault();
    })


</script>
  </body>

</html>
